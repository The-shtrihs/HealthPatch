services:
  test_db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health_secret
      POSTGRES_DB: health_patch_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health -d health_patch_test"]
      interval: 5s
      timeout: 3s
      retries: 5

  test:
    build:
      context: .
      target: dev         
    command: uv run pytest -v --tb=short
    env_file:
      - .env.test
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      test_db:
        condition: service_healthy