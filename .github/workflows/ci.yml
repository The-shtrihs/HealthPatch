name: Backend CI Pipeline
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-format:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff fix + format
        run: |
          ruff check . --fix       
          ruff format .

      - name: Commit changes 
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && git diff --staged --quiet || (
            git add -A &&
            git commit -m "style: auto-fix ruff lint and format" &&
            git pull --rebase origin ${{ github.head_ref || github.ref_name }} && 
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          )
  test:
    needs: lint-and-format
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Run Tests in Docker
        run: |
          docker compose -f docker-compose_test.yml up --build \
            --abort-on-container-exit \
            --exit-code-from test

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose_test.yml down -v
  
