name: Backend CI Pipeline
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff fix + format
        run: |
          ruff check . --fix       
          ruff format .           

      - name: Commit changes 
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && git diff --staged --quiet || (
            git add -A &&
            git commit -m "style: auto-fix ruff lint and format" &&
            git pull --rebase origin ${{ github.head_ref || github.ref_name }} && 
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          )
  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint-and-format

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: health
          POSTGRES_PASSWORD: health_secret
          POSTGRES_DB: health_patch_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U health -d health_patch_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgresql+asyncpg://health:health_secret@localhost:5433/health_patch_test
      SECRET_KEY: test-secret-key-not-for-production
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --dev

      - name: Run all tests
        run: uv run pytest -v --tb=short
