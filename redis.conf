bind 0.0.0.0
port 6379

# Without password, Redis is open to anyone who can access the server. In production, it's recommended to set a strong password.
# requirepass your_password  

appendonly yes
appendfsync everysec

maxmemory 256mb
maxmemory-policy allkeys-lru

loglevel notice

slowlog-log-slower-than 10000
slowlog-max-len 128